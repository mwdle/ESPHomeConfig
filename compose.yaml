name: ESPHome
services:
  ESPHome:
    container_name: ESPHome
    hostname: esphome
    image: ghcr.io/esphome/esphome:2026.5.3@sha256:c1a2a042e351ed07d7e8e703f3b51dec9f836921cdfc867a5fd5472bad36b9fb
    restart: unless-stopped
    networks:
      LAN:
        gw_priority: 1
      ESPHome:
    volumes:
      - ./config:/config
      - esphome_build:/config/.esphome # Put build directory outside of the project folder
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      # allow read_only fs
      - PLATFORMIO_CORE_DIR=.plattformio
      - PLATFORMIO_GLOBALLIB_DIR=.plattformioLibs

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald

    deploy:
      resources:
        limits:
          cpus: 5
          memory: 2GB
          pids: 100

networks:
  ESPHome:
    external: true
  LAN:
    external: true

volumes:
  esphome_build:
