name: ESPHome
services:
  ESPHome:
    container_name: ESPHome
    hostname: esphome
    image: ghcr.io/esphome/esphome:2026.7.1@sha256:b4ac9ddc2fc702e629540baac62df0ac5912fc11e90c1b267337c6413d03243c
    restart: unless-stopped
    networks:
      ESPHome:
      LAN:
        gw_priority: 1
        ipv4_address: 10.0.11.13
    volumes:
      - ./config:/config
      - esphome_build:/config/.esphome # Put build directory outside of the project folder
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - ESPHOME_USERNAME=${ESPHOME_USERNAME}
      - ESPHOME_PASSWORD=${ESPHOME_PASSWORD}
      # https://github.com/esphome/issues/issues/3558
      - PLATFORMIO_CORE_DIR=.plattformio
      - PLATFORMIO_GLOBALLIB_DIR=.plattformioLibs

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald

    deploy:
      resources:
        limits:
          cpus: 5
          memory: 2GB
          pids: 100

networks:
  ESPHome:
    external: true
  LAN:
    external: true

volumes:
  esphome_build:
